circuitry: "0.5"
metadata:
  tags:
    - research
exports:
  main:
    run: assistant
    input:
      question: string
      limit: integer
resources:
  example_extension:
    extension:
      package: "@zinc/example"
      attach: default
      title: Example
  sample_answer:
    data:
      value:
        answer: yes
        confidence: 0.5
        slug: ok-slug
        warnings:
          - a
        old_warnings:
          - b
        scores:
          A: 1
        status: success
        ok: true
        maybe_note: null
        value: 2
        event:
          type: tool
          name: read
          input: raw
        response: done
  assistant:
    model:
      input:
        - $question
      schema:
        answer: string
        confidence:
          type: number
          range:
            min: 0
            max: 1
        slug:
          type: string
          pattern: "^[a-z0-9-]+$"
          length:
            min: 1
            max: 20
        warnings:
          array: string
          length:
            max: 2
        old_warnings:
          list: string
        scores:
          record: number
          key:
            pattern: "^[A-Z_][A-Z0-9_]*$"
        status:
          enum:
            - success
            - partial
            - error
        ok:
          literal: true
        maybe_note:
          optional:
            nullable: string
        value:
          union:
            - string
            - number
        event:
          union:
            tag: type
            variants:
              message:
                type:
                  literal: message
                text: string
              tool:
                type:
                  literal: tool
                name: string
                input: any
        response:
          type: string
          annotations:
            ui:
              multiline: true
  reviewer:
    model:
      input:
        - assistant
      schema:
        answer: string
        confidence:
          type: number
