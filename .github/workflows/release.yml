name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-linux-gnu
            archive: circuitry-zig-linux-x86_64.tar.gz
            binary: circuitry-zig
          - target: x86_64-macos
            archive: circuitry-zig-macos-x86_64.tar.gz
            binary: circuitry-zig
          - target: aarch64-macos
            archive: circuitry-zig-macos-aarch64.tar.gz
            binary: circuitry-zig
          - target: x86_64-windows
            archive: circuitry-zig-windows-x86_64.zip
            binary: circuitry-zig.exe
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.16.0
      - run: zig build test
      - run: zig build -Doptimize=ReleaseFast -Dtarget=${{ matrix.target }}
      - name: Package archive
        run: |
          if [[ "${{ matrix.archive }}" == *.zip ]]; then
            (cd zig-out/bin && zip "../../${{ matrix.archive }}" "${{ matrix.binary }}")
          else
            tar -czf "${{ matrix.archive }}" -C zig-out/bin "${{ matrix.binary }}"
          fi
          sha256sum "${{ matrix.archive }}" > "${{ matrix.archive }}.sha256"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.archive }}
          path: |
            ${{ matrix.archive }}
            ${{ matrix.archive }}.sha256
          if-no-files-found: error

  source-package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build Zig source package
        run: |
          version="${GITHUB_REF_NAME#v}"
          package="circuitry-zig-${version}"
          rm -rf "$package"
          mkdir -p "$package"
          cp build.zig build.zig.zon README.md LICENSE "$package/"
          cp -R src tests examples "$package/"
          tar -czf "${package}.tar.gz" "$package"
          python - <<'PY' "${package}.tar.gz" > "${package}.tar.gz.sha256"
          import hashlib, pathlib, sys
          path = pathlib.Path(sys.argv[1])
          print(f"{hashlib.sha256(path.read_bytes()).hexdigest()}  {path.name}")
          PY

      - uses: actions/upload-artifact@v4
        with:
          name: circuitry-zig-source
          path: |
            circuitry-zig-*.tar.gz
            circuitry-zig-*.tar.gz.sha256
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs:
      - build
      - source-package
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
