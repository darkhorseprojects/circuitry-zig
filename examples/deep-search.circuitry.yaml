circuitry: "0.6.4"
name: deep search
about: Spend only the search effort needed to answer with support.

takes:
  $question: text
  $current_date: date

uses:
  search:
    takes:
      query: $question
      current_date: $current_date
    does: |
      Find sources relevant to the question.
    gives:
      sources: $sources

  read:
    takes:
      sources: $sources
    does: |
      Read the sources and keep only answer-bearing notes.
    gives:
      notes: $notes

  answer:
    takes:
      question: $question
      notes: $notes
    does: |
      Compare the notes, answer with citations, and state uncertainty.
    gives:
      answer: $answer
      citations: $citations
      uncertainty: $uncertainty

gives:
  $answer: text
  $citations: list
  $uncertainty: text
