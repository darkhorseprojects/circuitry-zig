circuitry: "0.6.4"
name: compute math
about: Calculate compound interest from explicit numeric inputs.

takes:
  $principal: number
  $rate: number
  $years: number

uses:
  compound_interest:
    takes:
      principal: $principal
      rate: $rate
      years: $years
    does: |
      Calculate compound interest.
      Return the final amount and earned interest.
    gives:
      amount: $amount
      interest: $interest

gives:
  $amount: number
  $interest: number
